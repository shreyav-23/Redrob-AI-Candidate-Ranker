ai_usage_summary: |
  Used ChatGPT for architecture discussion, feature engineering,
  debugging, reasoning generation, and runtime optimization.
  Used Gemini primarily for code cleanup and formatting.
  The ranking pipeline, experimentation, implementation,
  validation, and final design decisions were performed manually.

# ============================================================================
# Approach summary
# ============================================================================

methodology_summary: |
  Implemented a two-stage hybrid ranking pipeline. The first stage performs
  fast candidate retrieval using weighted feature engineering based on
  relevant AI skills, production ML experience, behavioral hiring signals,
  AI-specific experience, title relevance, and consulting-career penalties.
  The top candidates are then semantically re-ranked using the
  BAAI/bge-small-en-v1.5 embedding model against a compact representation
  of the job description. The final score combines normalized feature
  scores with semantic similarity. Candidate-specific reasoning is generated
  automatically for every selected candidate. The system is CPU-only,
  deterministic, and designed to satisfy the competition runtime constraints.

