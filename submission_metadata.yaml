# ============================================================================
# Approach summary
# ============================================================================

methodology_summary: |
  This project implements a two-stage AI candidate ranking pipeline.
  Candidate profiles are first scored using structured features,
  including technical skills, current role, years of experience,
  production AI indicators, and behavioral signals to efficiently
  retrieve the most relevant candidates from a large candidate pool.
  The shortlisted candidates are then re-ranked using semantic
  similarity computed with the BAAI/bge-small-en-v1.5 Sentence
  Transformer model. The final score combines feature-based
  retrieval with semantic relevance to generate an explainable
  top-100 ranked shortlist.

